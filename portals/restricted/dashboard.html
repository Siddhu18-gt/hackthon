<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Dashboard | Medixa</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-shield-alt"></i> Receptionists</h3>
        </div>
        
        <ul class="sidebar-nav">
            <li><a href="dashboard.html" class="active">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a></li>
            <li><a href="patient-management.html">
                <i class="fas fa-users"></i> Patient Management
            </a></li>
            <li><a href="doctor-management.html">
                <i class="fas fa-user-md"></i> Doctor Management
            </a></li>
            <li><a href="nurse-management.html">
                <i class="fas fa-user-nurse"></i> Nurse Management
            </a></li>
            <li><a href="billing.html">
                <i class="fas fa-file-invoice-dollar"></i> Billing
            </a></li>
        </ul>
        
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <strong id="userName">User Name</strong>
            </div>
            <a href="login.html" class="btn btn-secondary btn-block btn-small">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <a href="../../index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </div>
            <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;">
                Welcome to the Receptionist Dashboard. Use the sidebar to navigate to different sections.
            </p>
            
            <!-- Registered Patients Section -->
            <div style="margin-top: 30px;">
                <h3 style="font-size: 16px; color: var(--primary-color); margin-bottom: 15px;">
                    <i class="fas fa-users"></i> My Registered Patients
                </h3>
                <div id="patientsListContainer">
                    <p style="color: var(--text-muted); font-size: 12px;">Loading patients...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../../assets/js/main.js"></script>
    <script>
        // Get user name from session
        const userName = localStorage.getItem('receptionist_name') || 'User';
        document.getElementById('userName').textContent = userName;
        
        // Format Aadhaar number
        function formatAadhaar(aadhaar) {
            if (!aadhaar) return '';
            const cleaned = aadhaar.replace(/\s/g, '');
            if (cleaned.length === 12) {
                return cleaned.match(/.{1,4}/g).join(' ');
            }
            return aadhaar;
        }
        
        // Load registered patients
        async function loadRegisteredPatients() {
            try {
                const response = await fetch('../../api/get_receptionist_patients.php');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                
                const container = document.getElementById('patientsListContainer');
                
                if (result.success && result.patients && result.patients.length > 0) {
                    container.innerHTML = `
                        <div style="margin-bottom: 10px; font-size: 12px; color: var(--text-secondary);">
                            <strong>Total Registered: ${result.count}</strong>
                        </div>
                        <div style="overflow-x: auto;">
                            <table class="table" style="font-size: 12px;">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Aadhaar</th>
                                        <th>Age</th>
                                        <th>Gender</th>
                                        <th>Mobile</th>
                                        <th>Scheme</th>
                                        <th>Doctor</th>
                                        <th>Registered Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="patientsTableBody">
                                </tbody>
                            </table>
                        </div>
                    `;
                    
                    const tbody = document.getElementById('patientsTableBody');
                    result.patients.forEach(patient => {
                        const tr = document.createElement('tr');
                        const regDate = new Date(patient.registration_date).toLocaleDateString('en-IN', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric'
                        });
                        
                        tr.innerHTML = `
                            <td>${patient.name}</td>
                            <td>${formatAadhaar(patient.aadhaar_number)}</td>
                            <td>${patient.age}</td>
                            <td>${patient.gender}</td>
                            <td>${patient.mobile_number || 'N/A'}</td>
                            <td>${patient.scheme || 'None'}</td>
                            <td>${patient.doctor_name || 'Not Assigned'}</td>
                            <td>${regDate}</td>
                            <td>
                                <button class="btn btn-secondary btn-small" onclick="loginPatient(${patient.id})" title="Login Patient">
                                    <i class="fas fa-sign-in-alt"></i>
                                </button>
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    container.innerHTML = `
                        <p style="color: var(--text-muted); font-size: 12px; padding: 20px; text-align: center;">
                            <i class="fas fa-info-circle"></i> No patients registered yet.
                        </p>
                    `;
                }
            } catch (error) {
                console.error('Error loading patients:', error);
                document.getElementById('patientsListContainer').innerHTML = `
                    <p style="color: var(--danger); font-size: 12px;">Error loading patients: ${error.message}</p>
                `;
            }
        }
        
        function loginPatient(patientId) {
            // Find patient in the list and login
            fetch('../../api/get_receptionist_patients.php')
                .then(response => response.json())
                .then(result => {
                    if (result.success) {
                        const patient = result.patients.find(p => p.id === patientId);
                        if (patient) {
                            localStorage.setItem('current_patient', JSON.stringify(patient));
                            window.location.href = 'patient-doctor-page.html';
                        }
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error loading patient details');
                });
        }
        
        // Load patients on page load
        loadRegisteredPatients();
    </script>
</body>
</html>
