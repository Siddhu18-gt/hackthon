<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard | Medixa</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-user-injured"></i> Patient</h3>
        </div>
        
        <ul class="sidebar-nav">
            <li><a href="patient-report.html">
                <i class="fas fa-file-medical"></i> Patient Report
            </a></li>
            <li><a href="billing.html">
                <i class="fas fa-file-invoice-dollar"></i> Billing
            </a></li>
        </ul>
        
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <strong id="patientName">Patient Name</strong>
            </div>
            <a href="login.html" class="btn btn-secondary btn-block btn-small">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <a href="../../index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
        
        <div class="card">
            <div class="card-header">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </div>
            <p style="font-size: 13px; color: var(--text-secondary);">
                Welcome! Use the sidebar to view your medical report and billing information.
            </p>
        </div>
    </div>
    
    <script src="../../assets/js/main.js"></script>
    <script>
        const patient = JSON.parse(localStorage.getItem('current_patient') || '{}');
        const patientName = patient.name || 'Patient';
        document.getElementById('patientName').textContent = patientName;
    </script>
</body>
</html>
