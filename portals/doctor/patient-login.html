<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login | Doctor Portal</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/portal-modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f1f5f9;">
    <!-- Sidebar -->
    <div class="sidebar" style="background: white; border-right: 1px solid var(--portal-border);">
        <div class="sidebar-header" style="border-bottom: 1px solid var(--portal-border);">
            <h3 style="color: var(--portal-primary-dark);"><i class="fas fa-hand-holding-medical"></i> Medixa</h3>
        </div>
        
        <ul class="sidebar-nav" id="patientNavMenu">
            <li><a href="dashboard.html">
                <i class="fas fa-th-large"></i> Overview
            </a></li>
            <li><a href="patient-login.html" class="active" style="background: var(--portal-primary-light); color: var(--portal-primary-dark);">
                <i class="fas fa-user-injured"></i> Patient Records
            </a></li>
            <li><a href="doctor-management.html">
                <i class="fas fa-calendar-check"></i> Appointments
            </a></li>
        </ul>
        
        <div class="sidebar-footer" style="border-top: 1px solid var(--portal-border);">
            <div class="sidebar-user">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <div style="width: 36px; height: 36px; background: var(--portal-primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div>
                        <div id="doctorName" style="font-weight: 700; color: var(--portal-text-main); font-size: 14px;">Doctor Name</div>
                        <div style="font-size: 11px; color: var(--portal-text-sub);">Specialist</div>
                    </div>
                </div>
            </div>
            <a href="login.html" class="btn btn-secondary btn-block btn-small" style="justify-content: center;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content" style="padding: 40px;">
        <a href="dashboard.html" class="portal-back" style="margin-bottom: 30px;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        
        <div class="card" style="border-radius: 16px; border: 1px solid var(--portal-border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 32px;">
            <div class="card-header" style="border-bottom: 1px solid var(--portal-border); margin-bottom: 24px; padding-bottom: 16px;">
                <i class="fas fa-user-injured"></i> Patient Records Access
            </div>
            
            <div id="message-container"></div>
            
            <form id="patientLoginForm" class="portal-form" style="max-width: 500px;">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-id-card"></i> Aadhaar Number
                    </label>
                    <input type="text" class="form-input" name="aadhaar" 
                           data-aadhaar="true" placeholder="XXXX XXXX XXXX" maxlength="14" required>
                    <p style="font-size: 12px; color: var(--portal-text-sub); margin-top: 8px;">Enter the patient's 12-digit Aadhaar number to load their clinical history.</p>
                </div>
                
                <button type="submit" class="portal-btn" style="width: auto; min-width: 200px;">
                    <i class="fas fa-search"></i> Fetch Records
                </button>
            </form>
            
            <!-- Patient Details Display -->
            <div id="patientDetailsDisplay" style="display: none; margin-top: 40px; animation: portalFadeIn 0.5s ease;">
                <div style="background: #f8fafc; padding: 32px; border-radius: 16px; border: 1px solid var(--portal-border);">
                    <h4 style="font-size: 18px; font-weight: 700; color: var(--portal-text-main); margin-bottom: 24px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-id-badge" style="color: var(--portal-primary);"></i> Patient Information
                    </h4>
                    <div id="patientInfoContent"></div>
                </div>
                
                <div style="margin-top: 32px;">
                    <h4 style="font-size: 16px; font-weight: 700; color: var(--portal-text-main); margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-stream" style="color: var(--portal-primary);"></i> Clinical Actions
                    </h4>
                    <div style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <a href="doctor-page.html" class="portal-btn" style="margin-top: 0; padding: 12px 24px;">
                            <i class="fas fa-file-alt"></i> Open Doctor Page
                        </a>
                        <a href="patient-final-report.html" class="portal-btn" style="margin-top: 0; padding: 12px 24px; background: #0ea5e9;">
                            <i class="fas fa-file-medical"></i> View Final Report
                        </a>
                        <a href="test-report.html" class="portal-btn" style="margin-top: 0; padding: 12px 24px; background: #64748b;">
                            <i class="fas fa-vial"></i> Lab Test Reports
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../../assets/js/main.js"></script>
    <script src="../../assets/js/doctor.js"></script>
    <script>
        const doctorName = localStorage.getItem('doctor_name') || 'Doctor';
        document.getElementById('doctorName').textContent = doctorName;
        
        // Update sidebar menu after patient login
        const patientNavMenu = document.getElementById('patientNavMenu');
        const currentPatient = localStorage.getItem('current_patient');
        
        if (currentPatient) {
            const patient = JSON.parse(currentPatient);
            displayPatientDetails(patient);
            
            // Add sub-menu items
            patientNavMenu.innerHTML = `
                <li><a href="dashboard.html">
                    <i class="fas fa-th-large"></i> Overview
                </a></li>
                <li><a href="patient-login.html" class="active" style="background: var(--portal-primary-light); color: var(--portal-primary-dark);">
                    <i class="fas fa-user-injured"></i> Patient Records
                </a></li>
                <li style="padding-left: 20px;"><a href="doctor-page.html" style="font-size: 11px;">
                    <i class="fas fa-file-alt"></i> Doctor Page
                </a></li>
                <li style="padding-left: 20px;"><a href="patient-final-report.html" style="font-size: 11px;">
                    <i class="fas fa-file-medical"></i> Final Report
                </a></li>
                <li style="padding-left: 20px;"><a href="test-report.html" style="font-size: 11px;">
                    <i class="fas fa-vial"></i> Test Report
                </a></li>
                <li><a href="doctor-management.html">
                    <i class="fas fa-calendar-check"></i> Appointments
                </a></li>
            `;
        }
        
        function displayPatientDetails(patient) {
            const displayContainer = document.getElementById('patientDetailsDisplay');
            const infoContent = document.getElementById('patientInfoContent');
            
            if (!displayContainer || !infoContent) return;
            
            const photoPath = patient.photo_path ? `../../${patient.photo_path}` : null;
            const photoHtml = photoPath ? `<img src="${photoPath}" alt="Patient Photo" class="patient-photo" onerror="this.style.display='none'">` : '';
            
            infoContent.innerHTML = `
                ${photoHtml}
                <div class="detail-row">
                    <span class="detail-label">Name:</span>
                    <span class="detail-value">${patient.name}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Aadhaar:</span>
                    <span class="detail-value">${formatAadhaar(patient.aadhaar_number)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Date of Birth:</span>
                    <span class="detail-value">${formatDate(patient.date_of_birth)}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Age:</span>
                    <span class="detail-value">${patient.age ? `${patient.age} years` : 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Gender:</span>
                    <span class="detail-value">${patient.gender || 'N/A'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Address:</span>
                    <span class="detail-value">${patient.address}</span>
                </div>
                ${patient.cause ? `
                <div class="detail-row">
                    <span class="detail-label">Cause:</span>
                    <span class="detail-value">${patient.cause}</span>
                </div>
                ` : ''}
            `;
            
            displayContainer.style.display = 'block';
        }
    </script>
</body>
</html>
