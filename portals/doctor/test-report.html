<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Report | Medixa</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/portal-modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f1f5f9;">
    <!-- Sidebar -->
    <div class="sidebar" style="background: white; border-right: 1px solid var(--portal-border);">
        <div class="sidebar-header" style="border-bottom: 1px solid var(--portal-border);">
            <h3 style="color: var(--portal-primary-dark);"><i class="fas fa-hand-holding-medical"></i> Medixa</h3>
        </div>
        
        <ul class="sidebar-nav">
            <li><a href="dashboard.html">
                <i class="fas fa-th-large"></i> Overview
            </a></li>
            <li><a href="patient-login.html">
                <i class="fas fa-user-injured"></i> Patient Records
            </a></li>
            <li><a href="doctor-page.html">
                <i class="fas fa-file-alt"></i> Doctor Page
            </a></li>
            <li><a href="patient-final-report.html">
                <i class="fas fa-file-medical"></i> Final Report
            </a></li>
            <li><a href="test-report.html" class="active" style="background: var(--portal-primary-light); color: var(--portal-primary-dark);">
                <i class="fas fa-vial"></i> Test Report
            </a></li>
            <li><a href="doctor-management.html">
                <i class="fas fa-calendar-check"></i> Appointments
            </a></li>
        </ul>
        
        <div class="sidebar-footer" style="border-top: 1px solid var(--portal-border);">
            <div class="sidebar-user">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                    <div style="width: 36px; height: 36px; background: var(--portal-primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                        <i class="fas fa-user-md"></i>
                    </div>
                    <div>
                        <div id="doctorName" style="font-weight: 700; color: var(--portal-text-main); font-size: 14px;">Doctor Name</div>
                        <div style="font-size: 11px; color: var(--portal-text-sub);">Specialist</div>
                    </div>
                </div>
            </div>
            <a href="login.html" class="btn btn-secondary btn-block btn-small" style="justify-content: center;">
                <i class="fas fa-sign-out-alt"></i> Sign Out
            </a>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content" style="padding: 40px;">
        <a href="doctor-page.html" class="portal-back" style="margin-bottom: 30px;">
            <i class="fas fa-arrow-left"></i> Back to Clinical Entry
        </a>
        
        <div class="card" style="border-radius: 24px; padding: 40px; box-shadow: var(--portal-shadow); border: 1px solid var(--portal-border);">
            <div class="section-header">
                <h3 style="font-size: 20px; font-weight: 800; color: var(--portal-text-main); display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-microscope" style="color: var(--portal-primary);"></i> Diagnostic Test Inventory
                </h3>
            </div>
            
            <div class="table-container" style="margin-top: 24px;">
                <table class="record-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Test Name</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="testReportsTable">
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--portal-text-sub); padding: 40px;">
                                <i class="fas fa-spinner fa-spin" style="margin-bottom: 10px; display: block; font-size: 24px;"></i>
                                Loading reports...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- View Report Modal -->
    <div id="reportModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 2000; overflow: auto; backdrop-filter: blur(8px);">
        <div style="background: white; margin: 40px auto; padding: 0; max-width: 900px; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; background: #f8fafc; border-bottom: 1px solid var(--portal-border);">
                <h3 id="modalTitle" style="color: var(--portal-text-main); font-weight: 800; font-size: 18px;">Test Report</h3>
                <button class="portal-btn" style="margin-top: 0; width: auto; padding: 8px 16px; background: #ef4444;" onclick="closeModal()">
                    <i class="fas fa-times"></i> Close
                </button>
            </div>
            <div id="reportViewer" style="padding: 32px; background: #fff;">
                <!-- Report content -->
            </div>
        </div>
    </div>
    
    <script src="../../assets/js/main.js"></script>
    <script>
        const doctorName = localStorage.getItem('doctor_name') || 'Doctor';
        document.getElementById('doctorName').textContent = doctorName;
        
        // Load test reports
        loadTestReports();
        
        async function loadTestReports() {
            const patient = JSON.parse(localStorage.getItem('current_patient'));
            if (!patient) {
                showError('Patient not found');
                return;
            }
            
            try {
                const response = await fetch(`../../api/get_test_reports.php?patient_id=${patient.id}`);
                const result = await response.json();
                
                const tbody = document.getElementById('testReportsTable');
                tbody.innerHTML = '';
                
                if (result.success && result.reports && result.reports.length > 0) {
                    result.reports.forEach((report, index) => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${index + 1}</td>
                            <td>${report.test_name}</td>
                            <td>
                                <span style="padding: 4px 8px; border-radius: 4px; font-size: 11px; 
                                    background: ${report.status === 'completed' ? 'var(--success)' : 'var(--warning)'}; 
                                    color: white;">
                                    ${report.status}
                                </span>
                            </td>
                            <td>
                                ${report.report_file_path ? `
                                    <button class="portal-btn" style="margin-top: 0; padding: 6px 12px; font-size: 11px;" onclick="viewReport('${report.report_file_path}', '${report.test_name}')">
                                        <i class="fas fa-eye"></i> View Report
                                    </button>
                                ` : '<span style="color: var(--portal-text-sub); font-size: 11px; font-weight: 600;">Processing...</span>'}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-muted);">
                                No test reports available
                            </td>
                        </tr>
                    `;
                }
            } catch (error) {
                console.error('Error loading test reports:', error);
                showError('Failed to load test reports');
            }
        }
        
        function viewReport(filePath, testName) {
            const modal = document.getElementById('reportModal');
            const viewer = document.getElementById('reportViewer');
            
            viewer.innerHTML = `
                <h4 style="margin-bottom: 15px;">${testName} Report</h4>
                <iframe src="../../${filePath}" style="width: 100%; height: 600px; border: 1px solid #ddd;"></iframe>
            `;
            
            modal.style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('reportModal').style.display = 'none';
        }
        
        // Close modal on outside click
        document.getElementById('reportModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
